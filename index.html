<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevFolio</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#"><h1>DevFolio</h1></a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#hero">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
</ul>

</div>
</div>
</nav>

<!-- HERO SECTION -->
<section id="hero" class="hero text-center text-white d-flex align-items-center">
<div class="container">

<img src="https://via.placeholder.com/150" class="rounded-circle mb-3">

<h1>Intern</h1>
<p>Aspiring Full Stack Developer</p>

</div>
</section>

<!-- SKILLS -->
<section id="skills" class="container py-5">

<h2 class="text-center mb-4">Skills</h2>

<div class="row">

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">HTML</h5>
<p>Semantic web structure</p>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">CSS</h5>
<p>Responsive styling</p>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">JavaScript</h5>
<p>DOM manipulation</p>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">Java</h5>
<p>OOP Programming</p>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">React</h5>
<p>Frontend Framework</p>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-4 mb-3">
<div class="card skill-card">
<div class="card-body">
<h5 class="card-title">Git</h5>
<p>Version Control</p>
</div>
</div>
</div>

</div>
</section>

<!-- CONTACT FORM -->
<section id="contact" class="container py-5">

<h2 class="text-center mb-4">Contact Me</h2>

<form id="contactForm">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" id="name">
<small class="text-danger" id="nameError"></small>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email">
<small class="text-danger" id="emailError"></small>
</div>

<div class="mb-3">
<label>Message</label>
<textarea class="form-control" id="message"></textarea>
<small class="text-danger" id="messageError"></small>
</div>

<button type="submit" class="btn btn-primary">Submit</button>

</form>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3">

<p>© 2026 Aryan Rao</p>

</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
